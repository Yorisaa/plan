<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Мой план тренировок</title>
<style>
:root {
  --bg: #f7f5f0;
  --card: #ffffff;
  --text: #1a1a1a;
  --muted: #888;
  --border: #e0ddd8;
  --p1: #1a5c3a; --p1l: #eaf4ee;
  --p2: #1a4a7a; --p2l: #e8f0f8;
  --p3: #7a3a00; --p3l: #f8f0e8;
  --p4: #5a2d82; --p4l: #f0ebf8;
  --knee: #1a5c3a;
  --body: #1a4a7a;
  --stretch: #7a3a00;
  --rest: #888;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { font-size: 15px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
  min-height: 100vh;
  padding-bottom: 40px;
}

/* HEADER */
.app-header {
  background: var(--text);
  color: #fff;
  padding: 18px 16px 14px;
  position: sticky; top: 0; z-index: 100;
}
.app-header h1 {
  font-size: 1.35rem;
  font-weight: 800;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.app-header .today-pill {
  display: inline-block;
  background: rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 2px 10px;
  font-size: 0.72rem;
  margin-top: 3px;
  letter-spacing: 0.05em;
}

/* SELECTORS */
.selectors {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
}
.sel-label {
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--muted);
  margin-bottom: 7px;
}
.chip-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.chip-row:last-child { margin-bottom: 0; }
.chip {
  border: 1.5px solid var(--border);
  background: var(--bg);
  border-radius: 20px;
  padding: 5px 13px;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.chip.active {
  background: var(--text);
  color: #fff;
  border-color: var(--text);
}

/* DAY TABS */
.day-tabs {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  background: var(--card);
  border-bottom: 2px solid var(--border);
  position: sticky;
  top: 65px;
  z-index: 90;
}
.day-tab {
  padding: 10px 4px 8px;
  text-align: center;
  cursor: pointer;
  border-right: 1px solid var(--border);
  transition: all 0.15s;
}
.day-tab:last-child { border-right: none; }
.day-tab .dname {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--muted);
}
.day-tab .dtype {
  font-size: 0.6rem;
  margin-top: 2px;
  color: var(--muted);
}
.day-tab.active { background: var(--text); }
.day-tab.active .dname, .day-tab.active .dtype { color: #fff; }
.day-tab.today .dname { color: var(--p1); }

/* CONTENT */
.content { padding: 14px 12px; }

/* TIMING BAR */
.timing-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.time-badge {
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 600;
}
.time-badge.total { background: var(--text); color: #fff; }
.time-badge.knee  { background: var(--p1l); color: var(--knee); }
.time-badge.body  { background: var(--p2l); color: var(--body); }
.time-badge.str   { background: var(--p3l); color: var(--stretch); }

/* SECTION */
.section {
  margin-bottom: 14px;
}
.section-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 12px;
  border-radius: 8px 8px 0 0;
  font-weight: 700;
  font-size: 0.82rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.section-header.knee  { background: var(--p1l); color: var(--knee); }
.section-header.body  { background: var(--p2l); color: var(--body); }
.section-header.str   { background: var(--p3l); color: var(--stretch); }
.section-header .rest-info {
  margin-left: auto;
  font-size: 0.68rem;
  font-weight: 500;
  opacity: 0.85;
}

/* EXERCISE CARDS */
.ex-list {
  background: var(--card);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 8px 8px;
  overflow: hidden;
}
.ex-item {
  padding: 11px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.ex-item:last-child { border-bottom: none; }
.ex-num {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--muted);
  min-width: 20px;
  padding-top: 1px;
}
.ex-info { flex: 1; }
.ex-name { font-weight: 700; font-size: 0.88rem; margin-bottom: 2px; }
.ex-desc { font-size: 0.75rem; color: #666; line-height: 1.4; margin-bottom: 5px; }
.ex-sets {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.set-tag {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 3px 8px;
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text);
}

/* REST DAY */
.rest-day {
  text-align: center;
  padding: 50px 20px;
}
.rest-icon { font-size: 3rem; margin-bottom: 12px; }
.rest-day h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; }
.rest-day p { color: var(--muted); font-size: 0.9rem; line-height: 1.5; }

/* RULE BOX */
.rules-box {
  background: #fffbe6;
  border: 1px solid #e8d800;
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 14px;
  font-size: 0.78rem;
  color: #5a4a00;
  line-height: 1.6;
}
.rules-box strong { display: block; font-weight: 700; margin-bottom: 5px; font-size: 0.8rem; }

/* PHASE NOTICE */
.phase-notice {
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 14px;
  font-size: 0.78rem;
  font-weight: 500;
}
</style>
</head>

// ===================== STATE =====================
const DAYS = ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];
const TYPES = ["train+body","knee","train+body","knee","train+body","rest","rest"];

let state = {
  phase: 0,
  weekGroup: 0,
  day: new Date().getDay() === 0 ? 6 : new Date().getDay() - 1
};

// ===================== RENDER =====================
function render() {
  const app = document.getElementById('app');
  const ph = PHASES[state.phase];
  const wg = ph.weekGroups[state.weekGroup];
  const dayType = TYPES[state.day];

  const todayIdx = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;

  let html = `
  <div class="app-header">
    <h1>МОЙ ПЛАН ТРЕНИРОВОК</h1>
    <span class="today-pill">Сегодня: ${DAYS[todayIdx]}, ${new Date().toLocaleDateString('ru-RU',{day:'numeric',month:'long'})}</span>
  </div>

  <div class="selectors">
    <div class="sel-label">Фаза</div>
    <div class="chip-row">
      ${PHASES.map((p,i) => `<button class="chip ${i===state.phase?'active':''}" onclick="setPhase(${i})">${i+1} — ${p.name} <span style="font-weight:400;opacity:0.7;font-size:0.7rem">${p.weeks}</span></button>`).join('')}
    </div>
    <div class="sel-label">Неделя</div>
    <div class="chip-row">
      ${ph.weekGroups.map((wg,i) => `<button class="chip ${i===state.weekGroup?'active':''}" onclick="setWeek(${i})">${wg.label}</button>`).join('')}
    </div>
  </div>

  <div class="day-tabs">
    ${DAYS.map((d,i) => {
      const t = TYPES[i];
      const icon = t==='rest' ? '😴' : t==='knee' ? '🦵' : '💪';
      return `<div class="day-tab ${i===state.day?'active':''} ${i===todayIdx&&i!==state.day?'today':''}" onclick="setDay(${i})">
        <div class="dname">${d}</div>
        <div class="dtype">${icon}</div>
      </div>`;
    }).join('')}
  </div>

  <div class="content">
  `;

  if (dayType === 'rest') {
    html += `
    <div class="rest-day">
      <div class="rest-icon">😴</div>
      <h2>День отдыха</h2>
      <p>Мышцы растут в покое. Сегодня ничего делать не нужно.<br><br>Можно немного походить — это только полезно.</p>
    </div>`;
  } else {
    const isFullDay = dayType === 'train+body';
    const total = wg.kneeMin + (isFullDay ? wg.bodyMin + 2 : 0);

    html += `<div class="timing-bar">
      <span class="time-badge total">⏱ Всего ~${total} мин</span>
      <span class="time-badge knee">🦵 Колени ~${wg.kneeMin} мин</span>
      ${isFullDay ? `<span class="time-badge body">💪 Тело ~${wg.bodyMin} мин</span><span class="time-badge str">🧘 Растяжка ~2 мин</span>` : ''}
    </div>`;

    html += `<div class="rules-box">
      <strong>⚠ Правило одно</strong>
      Боль <u>в суставе</u> = немедленно стоп. Мышечная усталость = нормально и хорошо.
    </div>`;

    // KNEE SECTION
    html += renderSection("🦵 РЕАБИЛИТАЦИЯ КОЛЕНЕЙ", "knee", "Отдых между подходами: 45–60 сек", wg.knee, true);

    if (isFullDay) {
      html += renderSection("💪 ФУЛЛ-БОДИbreak ТРЕНИРОВКА", "body", "Отдых между подходами: 60 сек", wg.body, true);
      html += renderStretch();
    }
  }

  html += `</div>`;
  app.innerHTML = html;
}

function renderSection(title, cls, restInfo, exercises, showNums) {
  // Fix title
  title = title.replace('break ', '\n');
  let html = `<div class="section">
    <div class="section-header ${cls}">
      <span>${title.replace('\n','<br>')}</span>
      <span class="rest-info">${restInfo}</span>
    </div>
    <div class="ex-list">`;

  exercises.forEach((ex, i) => {
    const tags = [];
    if (ex.sets) tags.push(`${ex.sets} подх.`);
    if (ex.reps) tags.push(`${ex.reps} повт.`);
    if (ex.hold) tags.push(`держать ${ex.hold}`);
    if (ex.rest) tags.push(`отдых ${ex.rest}`);

    html += `<div class="ex-item">
      ${showNums ? `<span class="ex-num">${i+1}</span>` : ''}
      <div class="ex-info">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-desc">${ex.desc}</div>
        <div class="ex-sets">${tags.map(t => `<span class="set-tag">${t}</span>`).join('')}</div>
      </div>
    </div>`;
  });

  html += `</div></div>`;
  return html;
}

function renderStretch() {
  let html = `<div class="section">
    <div class="section-header str">
      <span>🧘 РАСТЯЖКА</span>
      <span class="rest-info">~2 минуты · без боли</span>
    </div>
    <div class="ex-list">`;

  STRETCH.forEach((ex, i) => {
    html += `<div class="ex-item">
      <span class="ex-num">${i+1}</span>
      <div class="ex-info">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-desc">${ex.desc}</div>
        <div class="ex-sets"><span class="set-tag">${ex.hold}</span></div>
      </div>
    </div>`;
  });

  html += `</div></div>`;
  return html;
}

// ===================== ACTIONS =====================
function setPhase(i) { state.phase = i; state.weekGroup = 0; render(); }
function setWeek(i)  { state.weekGroup = i; render(); }
function setDay(i)   { state.day = i; render(); }

// ===================== INIT =====================
render();
</script>
